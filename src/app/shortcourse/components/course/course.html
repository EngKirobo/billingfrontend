<div class="page-wrapper">

  <div class="content-card">

    <h2>
      Course Management
    </h2>

    <!-- SUCCESS -->
    <div
      *ngIf="successMessage"
      class="alert success">

      {{ successMessage }}

    </div>

    <!-- ERROR -->
    <div
      *ngIf="errorMessage"
      class="alert error">

      {{ errorMessage }}

    </div>

    <!-- FORM -->
    <form
      [formGroup]="courseForm"
      (ngSubmit)="submit()">

      <div class="form-grid">

        <!-- NAME -->
        <div class="form-group">

          <label>
            Course Name *
          </label>

          <input
            type="text"
            formControlName="name"
            class="form-control"
          >

        </div>

        <!-- DESCRIPTION -->
        <div class="form-group">

          <label>
            Description
          </label>

          <input
            type="text"
            formControlName="description"
            class="form-control"
          >

        </div>

        <!-- PRICE -->
        <div class="form-group">

          <label>
            Price
          </label>

          <input
            type="number"
            formControlName="price"
            class="form-control"
          >

        </div>

        <!-- DEPARTMENT -->
        <div class="form-group">

          <label>
            Department ID
          </label>

          <input
            type="number"
            formControlName="deptId"
            class="form-control"
          >

        </div>

      </div>

      <div class="button-group">

        <button
          type="submit"
          class="btn save-btn">

          {{ editingId
              ? 'Update Course'
              : 'Save Course' }}

        </button>

        <button
          type="button"
          class="btn reset-btn"
          (click)="resetForm()">

          Reset

        </button>

      </div>

    </form>

    <!-- TABLE -->
    <table class="room-table">

      <thead>

        <tr>

          <th>ID</th>

          <th>Name</th>

          <th>Description</th>

          <th>Price</th>

          <th>Department</th>

          <th>Actions</th>

        </tr>

      </thead>

      <tbody>

        <tr
          *ngFor="let course of courses">

          <td>{{ course.id }}</td>

          <td>{{ course.name }}</td>

          <td>{{ course.description }}</td>

          <td>{{ course.price }}</td>

          <td>{{ course.deptId }}</td>

          <td>

            <button
              class="btn edit-btn"
              (click)="editCourse(course)">

              Edit

            </button>

            <button
              class="btn delete-btn"
              (click)="deleteCourse(course.id)">

              Delete

            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
