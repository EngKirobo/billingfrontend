<div class="page-wrapper">

  <div class="content-card">

    <h2 class="title">Hostel Management</h2>

    <!-- FORM -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="form-section">

      <div class="form-group">
        <label>Name</label>
        <input type="text" formControlName="name" class="form-control">
      </div>

      <div class="form-group">
        <label>Description</label>
        <input type="text" formControlName="description" class="form-control">
      </div>

      <div class="form-group">
        <label>Location</label>
        <input type="text" formControlName="location" class="form-control">
      </div>

      <div class="form-group">
        <label>Capacity</label>
        <input type="number" formControlName="capacity" class="form-control">
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" type="submit">
          {{ isEdit ? 'Update' : 'Create' }}
        </button>

        <button type="button" class="btn btn-secondary" (click)="reset()">
          Reset
        </button>
      </div>

    </form>

    <!-- TABLE -->
    <div class="table-section">
      <table class="custom-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Location</th>
            <th>Capacity</th>
            <th>Created</th>
            <th>Updated</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let h of hostels; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ h.name }}</td>
            <td>{{ h.description }}</td>
            <td>{{ h.location }}</td>
            <td>{{ h.capacity }}</td>
            <td>{{ h.createdAt | date:'short' }}</td>
            <td>{{ h.updatedAt | date:'short' }}</td>
            <td>
              <button class="btn btn-warning btn-sm" (click)="edit(h)">Edit</button>
              <button class="btn btn-danger btn-sm" (click)="delete(h.id!)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</div>
