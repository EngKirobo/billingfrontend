<div class="dashboard-container">

  <!-- MOBILE MENU BUTTON -->
  <button
    class="mobile-menu-btn"
    (click)="mobileMenuOpen = !mobileMenuOpen"
  >
    ☰
  </button>

  <!-- MOBILE MENU -->
  <div
    class="mobile-menu"
    [class.active]="mobileMenuOpen"
  >

    <div class="mobile-menu-content">

      <div class="sidebar-top">
        <h2 class="logo">Hostel Dashboard</h2>
        <p class="subtitle">Management System</p>
      </div>

      <nav class="menu">

  <div *ngFor="let item of menuItems">

    <!-- NORMAL LINK -->
    <a
      *ngIf="!item.children"
      [routerLink]="item.route"
      routerLinkActive="active-link"
      class="menu-link"
      (click)="mobileMenuOpen = false"
    >
      <span>{{ item.label }}</span>
    </a>

    <!-- DROPDOWN -->
    <div *ngIf="item.children">

      <!-- PARENT -->
      <div
        class="menu-link dropdown-title"
        (click)="item.expanded = !item.expanded"
      >

        <span>{{ item.label }}</span>

        <span>
          {{ item.expanded ? '▲' : '▼' }}
        </span>

      </div>

      <!-- CHILDREN -->
      <div
        class="submenu"
        *ngIf="item.expanded"
      >

        <a
          *ngFor="let child of item.children"
          [routerLink]="child.route"
          routerLinkActive="active-link"
          class="submenu-link"
          (click)="mobileMenuOpen = false"
        >
          {{ child.label }}
        </a>

      </div>

    </div>

  </div>

</nav>

    </div>

  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-top">

      <h2 class="logo">
        Hostel Dashboard
      </h2>

      <p class="subtitle">
        Management System
      </p>

    </div>


    <nav class="menu">

  <div *ngFor="let item of menuItems">

    <!-- NORMAL LINK -->
    <a
      *ngIf="!item.children"
      [routerLink]="item.route"
      routerLinkActive="active-link"
      class="menu-link"
      (click)="mobileMenuOpen = false"
    >
      <span>{{ item.label }}</span>
    </a>

    <!-- DROPDOWN -->
    <div *ngIf="item.children">

      <!-- PARENT -->
      <div
        class="menu-link dropdown-title"
        (click)="item.expanded = !item.expanded"
      >

        <span>{{ item.label }}</span>

        <span>
          {{ item.expanded ? '▲' : '▼' }}
        </span>

      </div>

      <!-- CHILDREN -->
      <div
        class="submenu"
        *ngIf="item.expanded"
      >

        <a
          *ngFor="let child of item.children"
          [routerLink]="child.route"
          routerLinkActive="active-link"
          class="submenu-link"
          (click)="mobileMenuOpen = false"
        >
          {{ child.label }}
        </a>

      </div>

    </div>

  </div>

</nav>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- TOP NAVBAR -->
    <header class="top-navbar">

      <div>
        <h2>Welcome</h2>
      </div>

      <div class="nav-right">

        <span class="welcome-text">
          Welcome, Admin
        </span>

        <button
          class="btn btn-danger"
          (click)="logout()"
        >
          Logout
        </button>

      </div>

    </header>

    <!-- ROUTER CONTENT -->
    <div class="content-card">

      <router-outlet></router-outlet>

    </div>

  </main>

</div>
